services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MONGODB_URI:
      AETHERA_DATA_DIR: /app/.aethera/run
      AETHERA_BACKUP_DIR: /app/.aethera/backup
      AETHERA_WORLD_UPLOAD_DIR: /app/.aethera/world_upload
    volumes:
      # Docker socket — required for container orchestration
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent storage managed by Coolify/Docker volumes
      - aethera-run:/app/.aethera/run
      - aethera-backup:/app/.aethera/backup
      - aethera-world-upload:/app/.aethera/world_upload
    mem_limit: 1g
    memswap_limit: 1g
    depends_on:
      - mongo
    networks:
      - aethera-net

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME:
      MONGO_INITDB_ROOT_PASSWORD:
    volumes:
      - mongo-db:/data/db
    mem_limit: 512m
    memswap_limit: 512m
    networks:
      - aethera-net

volumes:
  aethera-run:
  aethera-backup:
  aethera-world-upload:
  mongo-db:

networks:
  aethera-net:
    name: aethera-net
    driver: bridge
